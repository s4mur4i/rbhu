  parameters:
    payment_product:
      name: payment_product
      in: path
      required: true
      schema:
        type: string
        enum:
          - domestic
          - sepa-credit-transfers
          - cross-border-credit-transfers
    X-Request-ID:
      name: X-Request-ID
      in: header
      description: ID of the request, unique to the call, as determined by the initiating
        party.
      required: true
      schema:
        type: string
        format: uuid
    PSU-IP-Address:
      name: PSU-IP-Address
      in: header
      description: The forwarded IP Address header field consists of the corresponding
        http request IP Address field between PSU and TPP.
      required: true
      schema:
        type: string
        format: ipv4
      example: '192.168.8.78'
    Digest:
      name: Digest
      in: header
      description: |-
        The digest is a base64 encoded hash of the body.
        Hash the body of your request (or an empty string if there is no body) using the SHA-256 algorithm.
        Base64 encode the output and add the result to your Digest header, specifying the hashing algorithm used.
      schema:
        type: string
      example: SHA-256=ZuYiOtZkVxhjWmwTO5lOpsPevUNMezvk6dfb6fVhebM=
    Signature:
      name: Signature
      in: header
      description: |-
        A signature of the request by the TPP at the application level. This might be mandated by the ASPSP. 
        The signature is a list of headers with their signed values. Any header can be used in the signature (including the `Digest` header), with the exception of the `client_id` header. 
        To sign the `client_id` header, its name should be treated as `clientId`.
        First, prepare the headers in the format of "header name: header value" with a line separator, e.g.,
        ```
        Digest: SHA-256=ZuYiOtZkVxhjWmwTO5lOpsPevUNMezvk6dfb6fVhebM=
        clientId: WmwTO5lOpsPevUNMezvk6df
        ```
        Then, sign this string using your private key and hash it with SHA-256 using RSA.
        Finally, base64 encode the resulting value. The `Signature` header should include the `keyId`, `algorithm="rsa-sha256"`, `headers` list, and the base64 encoded signature.
      example: |-
        keyId="SN=9FA1,CA=D-TRUST%20CA%202-1%202015,O=D-Trust%20GmbH,C=DE",algorithm="rsa-sha256",
        headers="Digest clientId",
        signature="Base64(RSA-SHA256(signing string))"
      schema:
        type: string
    TPP-Signature-Certificate:
      name: TPP-Signature-Certificate
      in: header
      description: |-
        The certificate used for signing the request, in base64 encoding.
        Must be included if a signature is present. The request must be signed with your QSEAL certificate.
        The algorithm used for the signature must be RSA-SHA256. If this header is present, the `Signature` and `Digest` headers must also be provided.
      schema:
        type: string
      example: MIIHXTCCBUWgAwIBAgIMIgFezw5y5yKRhs9TMA0GCSqGSIb3DQEBCwUAMGUxCzACORgEBMBMGBgQAjkYBBjAJBgcEAI5GAQYCMDQGBgQAjkYBBTAqMCgWImh0dHBzOi8vd3d3LmNlcnRzaWduLnJvL3JlcG9z...
    PSU-ID:
      name: PSU-ID
      in: header
      description: >-
        Client ID of the PSU in the ASPSP client
        interface.
        It is mandated by the Raiffeisen Bank to be required field if the PSU-Corporate-ID is not provided.
        It might be contained even if an OAuth2 based authentication was performed in a
        pre-step In this case the ASPSP might
        check whether PSU-ID and token match,
        according to ASPSP documentation.
      schema:
        type: string
    PSU-ID-Type:
      name: PSU-ID-Type
      in: header
      description: |-
        Type of the PSU-ID, needed in scenarios where PSUs have several PSU-IDs as access possibility.

        In this case, the mean and use are then defined in the ASPSP�s documentation.
      schema:
        type: string
    PSU-Corporate-ID:
      name: PSU-Corporate-ID
      in: header
      description: It is mandated by the Raiffeisen Bank to be required field if the PSU-ID is not provided.
      schema:
        type: string
    PSU-Corporate-ID-Type:
      name: PSU-Corporate-ID-Type
      in: header
      description: Might be mandated in the ASPSP's documentation. Only used in
        a corporate context.
      schema:
        type: string
    Consent-ID:
      name: Consent-ID
      in: header
      description: |-
        This data element may be contained, if the payment initiation transaction is part of a session, i.e. combined AIS/PIS service.
        This then contains the consentId of the related AIS consent, which was performed prior to this payment initiation.
      schema:
        type: string
    TPP-Redirect-Preferred:
      name: TPP-Redirect-Preferred
      in: header
      description: |-
        If it equals "true", the TPP prefers a redirect over an embedded SCA approach.
        If it equals "false", the TPP prefers not to be redirected for SCA. The ASPSP will then choose between the Embedded or the Decoupled
        SCA approach, depending on the choice of the SCA procedure by the TPP/PSU.
        If the parameter is not used, the ASPSP will choose the SCA approach to be applied depending on the SCA method chosen by the
        TPP/PSU.
      schema:
        type: string
        enum:
          - "true"
          - "false"
    TPP-Redirect-URI:
      name: TPP-Redirect-URI
      in: header
      description: |-
        URI of the URI of the TPP, where the transaction
          flow shall be redirected to after a
          Redirect. Mandated for the Redirect SCA
          Approach, specifically when TPP-Redirect-
          Preferred equals "true". See Section 4.10 for
          further requirements on this header.
          It is recommended to always use this header
          field.
      schema:
        type: string
    TPP-Nok-Redirect-URI:
      name: TPP-Nok-Redirect-URI
      in: header
      description: |-
        If this URI is contained, the TPP is asking to redirect the transaction flow to this address instead of the TPP-Redirect-URI in case
        of a negative result of the redirect SCA method. This might be ignored by the ASPSP.
      schema:
        type: string
    TPP-Explicit-Authorisation-Preferred:
      name: TPP-Explicit-Authorisation-Preferred
      in: header
      description: If it equals true, the TPP prefers to start the authorisation
        process separately, e.g. because of the usage of a signing basket.
        This preference might be ignored by the ASPSP, if a signing basket is not
        supported as functionality.If it equals false or if the parameter
        is not used, there is no preference of the TPP. This especially indicates
        that the TPP assumes a direct authorisation of the transaction in the
        next step, without using a signing basket.
      schema:
        type: string
        enum:
          - "true"
          - "false"
    TPP-Rejection-NoFunds-Preferred:
      name: TPP-Rejection-NoFunds-Preferred
      in: header
      description: If it equals true then the TPP prefers a rejection of the
        payment initiation in case the ASPSP is providing an integrated confirmation
        of funds request an the result of this is that not sufficient funds
        are available.If it equals false then the TPP prefers that the
        ASPSP is dealing with the payment initiation like in the ASPSPs online
        channel, potentially waiting for a certain time period for funds to arrive
        to initiate the payment.This parameter might be ignored by the ASPSP.
      schema:
        type: string
        enum:
          - "true"
          - "false"
    TPP-Notification-URI:
      name: TPP-Notification-URI
      in: header
      description: |-
        URI for the Endpoint of the TPP-API to which the status of the payment initiation should be sent.
        This header field may by ignored by the ASPSP.
      schema:
        type: string
    TPP-Notification-Content-Preferred:
      name: TPP-Notification-Content-Preferred
      in: header
      description: "The string has the form status=X1, ..., Xn where Xi is
        one of the constants SCA, PROCESS, LAST and where constants are not
        repeated.The usage of the constants supports the of following semantics:
        SCA: A notification on every change of the scaStatus attribute for all
        related authorisation processes is preferred by the TPP.  PROCESS:
        A notification on all changes of consentStatus or transactionStatus attributes
        is preferred by the TPP.  LAST: Only a notification on the last consentStatus
        or transactionStatus as available in the XS2A interface is preferred by
        the TPP.This header field may be ignored, if the ASPSP does not support
        resource notification services for the related TPP."
      schema:
        type: string
    PSU-IP-Port:
      name: PSU-IP-Port
      in: header
      description: The forwarded IP Port header field consists of the corresponding
        HTTP request IP Port field between PSU and TPP, if available.
      schema:
        type: string
    PSU-Accept:
      name: PSU-Accept
      in: header
      description: The forwarded IP Accept header fields consist of the corresponding
        HTTP request Accept header fields between PSU and TPP, if available.
      schema:
        type: string
    PSU-Accept-Charset:
      name: PSU-Accept-Charset
      in: header
      description: The forwarded IP Accept header fields consist of the corresponding
        HTTP request Accept header fields between PSU and TPP, if available.
      schema:
        type: string
    PSU-Accept-Encoding:
      name: PSU-Accept-Encoding
      in: header
      description: The forwarded IP Accept header fields consist of the corresponding
        HTTP request Accept header fields between PSU and TPP, if available.
      schema:
        type: string
    PSU-Accept-Language:
      name: PSU-Accept-Language
      in: header
      description: The forwarded IP Accept header fields consist of the corresponding
        HTTP request Accept header fields between PSU and TPP, if available.
      schema:
        type: string
    PSU-User-Agent:
      name: PSU-User-Agent
      in: header
      description: |-
        The forwarded Agent header field of the HTTP request between
        PSU and TPP, if available.
        Examples
          * Android:  "Myappa/1.2 Dalvik/2.1.0 (Linux; U; Android 6.0.1; vivo 1610 Build/MMB29M)"
          * iOS: "MyApp/1 iPhone5,2 iOS/10_1 CFNetwork/808.3 Darwin/16.3.0"
      schema:
        type: string
    PSU-Http-Method:
      name: PSU-Http-Method
      in: header
      description: |-
        HTTP method used at the PSU ? TPP interface, if available.
        Valid values are:
        * GET
        * POST
        * PUT
        * PATCH
        * DELETE
      schema:
        type: string
        enum:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
    PSU-Device-ID:
      name: PSU-Device-ID
      in: header
      description: |-
        UUID (Universally Unique Identifier) for a device, which is used by the PSU, if available.
        UUID identifies either a device or a device dependant application installation.
        In case of an installation identification this ID need to be unaltered until removal from device.
      schema:
        type: string
        format: uuid
    PSU-Geo-Location:
      name: PSU-Geo-Location
      in: header
      description: The forwarded Geo Location of the corresponding http request
        between PSU and TPP if available.
      schema:
        pattern: GEO:-?[0-9]{1,2}\.[0-9]{6};-?[0-9]{1,3}\.[0-9]{6}
        type: string
  securitySchemes:
    clientIdHeader:
      type: apiKey
      name: client_id
      in: header