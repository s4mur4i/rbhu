openapi: 3.0.1
x-kong-name: psd2-bulk-payments-api-132
info:
  title: Bulk Payments API
  version: 1.3.2
  description: API for executing bulk payments from $(APIENV_TENANTID)
servers:
  - url: https://hu-api-sandbox.raiffeisen.hu/rbhu/prod02/psd2-bulk-payments-api-1.3.2/v1/
security:
  - clientIdHeader: []
paths:
  /bulk-payments/{payment_product}:
    post:
      operationId: initiateBulkPayments
      x-kong-plugin-request-validator:
        enabled: true
      tags:
        - Bulk-payments initiation requests
      summary: Bulk-payments request
      description: A collection of several payment initiation requests.
      parameters:
        - $ref: "#/components/parameters/payment_product"
        - $ref: "#/components/parameters/X-Request-ID"
        - $ref: "#/components/parameters/PSU-IP-Address"
        - $ref: "#/components/parameters/Digest"
        - $ref: "#/components/parameters/Signature"
        - $ref: "#/components/parameters/TPP-Signature-Certificate"
        - $ref: "#/components/parameters/PSU-ID"
        - $ref: "#/components/parameters/PSU-ID-Type"
        - $ref: "#/components/parameters/PSU-Corporate-ID"
        - $ref: "#/components/parameters/PSU-Corporate-ID-Type"
        - $ref: "#/components/parameters/Consent-ID"
        - $ref: "#/components/parameters/TPP-Redirect-Preferred"
        - $ref: "#/components/parameters/TPP-Redirect-URI"
        - $ref: "#/components/parameters/TPP-Nok-Redirect-URI"
        - $ref: "#/components/parameters/TPP-Explicit-Authorisation-Preferred"
        - $ref: "#/components/parameters/TPP-Rejection-NoFunds-Preferred"
        - $ref: "#/components/parameters/TPP-Notification-URI"
        - $ref: "#/components/parameters/TPP-Notification-Content-Preferred"
        - $ref: "#/components/parameters/PSU-IP-Port"
        - $ref: "#/components/parameters/PSU-Accept"
        - $ref: "#/components/parameters/PSU-Accept-Charset"
        - $ref: "#/components/parameters/PSU-Accept-Encoding"
        - $ref: "#/components/parameters/PSU-Accept-Language"
        - $ref: "#/components/parameters/PSU-User-Agent"
        - $ref: "#/components/parameters/PSU-Http-Method"
        - $ref: "#/components/parameters/PSU-Device-ID"
        - $ref: "#/components/parameters/PSU-Geo-Location"
      requestBody:
        description: JSON request body for a payment inition request message
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/bulkPaymentInitiation'
        required: true
      responses:
        201:
          description: CREATED
          headers:
            X-Request-ID:
              schema:
                type: string
                default: 99391c7e-ad88-49ec-a2ad-99ddcb1f7721
            ASPSP-SCA-Approach:
              schema:
                type: string
                default: EMBEDDED
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paymentInitationRequestResponse-201'
              example: '{"description":"Response in case of a redirect with an implicitly
                created authorisation sub-resource","value":{"transactionStatus":"RCVD","paymentId":"1234-wertiq-983","_links":{"scaRedirect":{"href":"https://www.testbank.com/asdfasdfasdf"},"self":{"href":"/v1/payments/sepa-credit-transfers/1234-wertiq-983"},"status":{"href":"/v1/payments/1234-wertiq-983/status"},"scaStatus":{"href":"/v1/payments/1234-wertiq-983/authorisations/123auth456"}}}}'
        400:
          description: Bad Request
          headers:
            X-Request-ID:
              schema:
                type: string
                default: 99391c7e-ad88-49ec-a2ad-99ddcb1f7721
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400_NG_PIS'
        401:
          description: Unauthorized
          headers:
            X-Request-ID:
              schema:
                type: string
                default: 99391c7e-ad88-49ec-a2ad-99ddcb1f7721
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error401_NG_PIS'
        403:
          description: Forbidden
          headers:
            X-Request-ID:
              schema:
                type: string
                default: 99391c7e-ad88-49ec-a2ad-99ddcb1f7721
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error403_NG_PIS'
        404:
          description: Not found
          headers:
            X-Request-ID:
              schema:
                type: string
                default: 99391c7e-ad88-49ec-a2ad-99ddcb1f7721
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error404_NG_PIS'
        405:
          description: Method Not Allowed
          headers:
            X-Request-ID:
              schema:
                type: string
                default: 99391c7e-ad88-49ec-a2ad-99ddcb1f7721
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error405_NG_PIS'
        406:
          description: Not Acceptable
          headers:
            X-Request-ID:
              schema:
                type: string
                default: 99391c7e-ad88-49ec-a2ad-99ddcb1f7721
            Location:
              schema:
                type: string
          content: {}
        408:
          description: Request Timeout
          headers:
            X-Request-ID:
              schema:
                type: string
                default: 99391c7e-ad88-49ec-a2ad-99ddcb1f7721
            Location:
              schema:
                type: string
          content: {}
        409:
          description: Conflict
          headers:
            X-Request-ID:
              schema:
                type: string
                default: 99391c7e-ad88-49ec-a2ad-99ddcb1f7721
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error409_NG_PIS'
        415:
          description: Unsuported Media Type
          headers:
            X-Request-ID:
              schema:
                type: string
                default: 99391c7e-ad88-49ec-a2ad-99ddcb1f7721
            Location:
              schema:
                type: string
          content: {}
        429:
          description: Too Many Requests
          headers:
            X-Request-ID:
              schema:
                type: string
                default: 99391c7e-ad88-49ec-a2ad-99ddcb1f7721
            Location:
              schema:
                type: string
          content: {}
        500:
          description: Internal Server Error
          headers:
            X-Request-ID:
              schema:
                type: string
                default: 99391c7e-ad88-49ec-a2ad-99ddcb1f7721
            Location:
              schema:
                type: string
          content: {}
        503:
          description: Service Unavailable
          headers:
            X-Request-ID:
              schema:
                type: string
                default: 99391c7e-ad88-49ec-a2ad-99ddcb1f7721
            Location:
              schema:
                type: string
          content: {}
      x-codegen-request-body-name: body
components:
  schemas:
    accountReference:
      title: accountReference
      type: object
      properties:
        iban:
          pattern: '[A-Z]{2,2}[0-9]{2,2}[a-zA-Z0-9]{1,30}'
          type: string
          description: IBAN of an account
          example: FR7612345987650123456789014
      description: IBAN, of a payment accounts
    address:
      title: address
      required:
        - country
      type: object
      properties:
        street:
          maxLength: 70
          type: string
        buildingNumber:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          pattern: '[A-Z]{2}'
          type: string
          description: ISO 3166 ALPHA2 country code
          example: SE
      example:
        street: rue blue
        buildingnNumber: "89"
        city: Paris
        postalCode: "75000"
        country: FR
    amount:
      title: amount
      required:
        - amount
        - currency
      type: object
      properties:
        currency:
          pattern: '[A-Z]{3}'
          type: string
          description: ISO 4217 Alpha 3 currency code
          example: EUR
        amount:
          pattern: -?[0-9]{1,14}(\.[0-9]{1,3})?
          type: string
          description: |-
            The amount given with fractional digits, where fractions must be compliant to the currency definition.
            Up to 14 significant figures. Negative amounts are signed by minus.
            The decimal separator is a dot.

            **Example:**
            Valid representations for EUR with up to two decimals are:

              * 1056
              * 5768.2
              * -1.50
              * 5877.78
          example: "5877.78"
      example:
        currency: EUR
        amount: "123"
    bulkPaymentInitiation:
      title: bulkPaymentInitiation
      required:
        - debtorAccount
        - payments
      type: object
      properties:
        batchBookingPreferred:
          type: boolean
          description: "If this element equals 'true', the PSU prefers only one booking
           entry. If this element equals 'false', the PSU prefers individual
           booking of all contained individual transactions. The ASPSP will
           follow this preference according to contracts agreed on with the PSU."
          example: true
        debtorAccount:
          $ref: '#/components/schemas/accountReference'
        requestedExecutionDate:
          type: string
          format: date
        requestedExecutionTime:
          type: string
          format: date-time
        payments:
          type: array
          description: |-
            A list of generic JSON bodies payment initations for bulk payments via JSON.

            Note: Some fields from single payments do not occcur in a bulk payment element
          items:
            $ref: '#/components/schemas/paymentInitiationBulkElement'
      description: "Generic Body for a bulk payment initiation via JSON.paymentInformationId
        is contained in code but commented since it is n.a. and not all ASPSP
        are able to support this field now.In a later version the field will be
        mandatory."
    paymentInitiationBulkElement:
      title: paymentInitiationBulkElement
      required:
        - creditorAccount
        - creditorName
        - instructedAmount
      type: object
      properties:
        endToEndIdentification:
          maxLength: 35
          type: string
        instructedAmount:
          $ref: '#/components/schemas/amount'
        creditorAccount:
          $ref: '#/components/schemas/accountReference'
        creditorAgent:
          pattern: '[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}'
          type: string
          description: BICFI
          example: AAAADEBBXXX
        creditorAgentName:
          maxLength: 70
          type: string
          description: Creditor Agent Name
          example: Creditor Agent Name
        creditorName:
          maxLength: 70
          type: string
          description: Creditor Name
          example: Creditor Name
        creditorAddress:
          $ref: '#/components/schemas/address'
        remittanceInformationUnstructured:
          maxLength: 140
          type: string
          description: Unstructured remittance information
          example: Ref Number Merchant
      description: "Generic body for a bulk payment initiation entry.The bulk
        entry type is a type which follows the JSON formats for the supported products
        for single payments excluding the data elements (if supported):  * debtorAccount
         * requestedExecutionDate,  * requestedExecutionTime.These data elements
        may not be contained in any bulk entry.This data object can be used
        to represent valid bulk payment initiations entry for the following JSON
        based payment product, which where defined in the Implementation Guidelines."
    paymentInitationRequestResponse-201:
      title: paymentInitationRequestResponse-201
      required:
        - _links
        - paymentId
        - transactionStatus
      type: object
      properties:
        transactionStatus:
          $ref: '#/components/schemas/transactionStatus'
        paymentId:
          type: string
          description: Resource identification of the generated payment initiation
            resource.
          example: 1234-wertiq-983
        transactionFees:
          $ref: '#/components/schemas/amount'
        transactionFeeIndicator:
          type: boolean
          description: |-
            If equals 'true', the transaction will involve specific transaction cost as shown by the ASPSP in
            their public price list or as agreed between ASPSP and PSU.
            If equals 'false', the transaction will not involve additional specific transaction costs to the PSU.
        scaMethods:
          type: array
          description: |-
            This data element might be contained, if SCA is required and if the PSU has a choice between different
            authentication methods.

            Depending on the risk management of the ASPSP this choice might be offered before or after the PSU
            has been identified with the first relevant factor, or if an access token is transported.

            If this data element is contained, then there is also an hyperlink of type 'startAuthorisationWithAuthenticationMethodSelection'
            contained in the response body.

            These methods shall be presented towards the PSU for selection by the TPP.
          items:
            $ref: '#/components/schemas/authenticationObject'
        chosenScaMethod:
          $ref: '#/components/schemas/authenticationObject'
        challengeData:
          $ref: '#/components/schemas/challengeData'
        _links:
          $ref: '#/components/schemas/_linksPaymentInitiation'
        psuMessage:
          maxLength: 512
          type: string
          description: Text to be displayed to the PSU
        tppMessages:
          type: array
          items:
            $ref: '#/components/schemas/tppMessage2XX'
      description: Body of the response for a successful payment initiation request.
    transactionStatus:
      title: transactionStatus
      type: string
      description: "The transaction status is filled with codes of the ISO 20022 data
        table:- 'ACCC': 'AcceptedSettlementCompleted' -  Settlement on the creditor's
        account has been completed.- 'ACCP': 'AcceptedCustomerProfile' -   Preceding
        check of technical validation was successful.   Customer profile check
        was also successful.- 'ACSC': 'AcceptedSettlementCompleted' -   Settlement
        on the debtor?s account has been completed.    **Usage:** this can be
        used by the first agent to report to the debtor that the transaction has
        been completed.     **Warning:** this status is provided for transaction
        status reasons, not for financial information.   It can only be used after
        bilateral agreement.- 'ACSP': 'AcceptedSettlementInProcess' -   All
        preceding checks such as technical validation and customer profile were
        successful and therefore the payment initiation has been accepted for execution.
        - 'ACTC': 'AcceptedTechnicalValidation' -   Authentication and syntactical
        and semantically validation are successful.- 'ACWC': 'AcceptedWithChange'
        - Instruction is accepted but a change will be made, such as date or
        remittance not sent.- 'ACWP': 'AcceptedWithoutPosting' -   Payment instruction
        included in the credit transfer is accepted without being posted to the
        creditor customer?s account.- 'RCVD': 'Received' -   Payment initiation
        has been received by the receiving agent.- 'PDNG': 'Pending' -   Payment
        initiation or individual transaction included in the payment initiation
        is pending.   Further checks and status update will be performed.- 'RJCT':
        'Rejected' -   Payment initiation or individual transaction included in
        the payment initiation has been rejected.- 'CANC': 'Cancelled'  Payment
        initiation has been cancelled before execution  Remark: This code is still
        requested from ISO20022.- 'ACFC': 'AcceptedFundsChecked' -  Preceding
        check of technical validation and customer profile was successful and an
        automatic funds check was positive .  Remark: This code is still requested
        from ISO20022.- 'PATC': 'PartiallyAcceptedTechnical'  Correct The payment
        initiation needs multiple authentications, where some but not yet all have
        been performed. Syntactical and semantically validations are successful.
        Remark: This code is still requested from ISO20022."
      example: ACCC
      enum:
        - ACCC
        - ACCP
        - ACSC
        - ACSP
        - ACTC
        - ACWC
        - ACWP
        - RCVD
        - PDNG
        - RJCT
        - CANC
        - ACFC
        - PATC
    authenticationObject:
      title: authenticationObject
      required:
        - authenticationMethodId
        - authenticationType
      type: object
      properties:
        authenticationType:
          $ref: '#/components/schemas/authenticationType'
        authenticationVersion:
          type: string
          description: |-
            Depending on the "authenticationType".
            This version can be used by differentiating authentication tools used within performing OTP generation in the same authentication type.
            This version can be referred to in the ASPSP?s documentation.
        authenticationMethodId:
          maxLength: 35
          type: string
          description: An identification provided by the ASPSP for the later identification
            of the authentication method selection.
          example: myAuthenticationID
        name:
          type: string
          description: |-
            This is the name of the authentication method defined by the PSU in the Online Banking frontend of the ASPSP.
            Alternatively this could be a description provided by the ASPSP like "SMS OTP on phone +49160 xxxxx 28".
            This name shall be used by the TPP when presenting a list of authentication methods to the PSU, if available.
          example: SMS OTP on phone +49160 xxxxx 28
        explanation:
          type: string
          description: Detailed information about the SCA method for the PSU.
          example: Detailed information about the SCA method for the PSU.
      description: Authentication Object
    authenticationType:
      title: authenticationType
      type: string
      description: "Type of the authentication method.\nMore authentication types\
        \ might be added during implementation projects and documented in the ASPSP\
        \ documentation.  - 'SMS_OTP': An SCA method, where an OTP linked to the\
        \ transaction to be authorised is sent to the PSU through a SMS channel.\
        \  - 'CHIP_OTP': An SCA method, where an OTP is generated by a chip card,\
        \ e.g. an TOP derived from an EMV cryptogram.     To contact the card, the\
        \ PSU normally needs a (handheld) device.     With this device, the PSU\
        \ either reads the challenging data through a visual interface like flickering\
        \ or     the PSU types in the challenge through the device key pad.  \
        \   The device then derives an OTP from the challenge data and displays the\
        \ OTP to the PSU.  - 'PHOTO_OTP': An SCA method, where the challenge is\
        \ a QR code or similar encoded visual data     which can be read in by a\
        \ consumer device or specific mobile app.     The device resp. the specific\
        \ app than derives an OTP from the visual challenge data and displays  \
        \   the OTP to the PSU.  - 'PUSH_OTP': An OTP is pushed to a dedicated authentication\
        \ APP and displayed to the PSU."
      example: SMS_OTP
      enum:
        - SMS_OTP
        - CHIP_OTP
        - PHOTO_OTP
        - PUSH_OTP
    OtpFormat:
      title: OtpFormat
      type: string
      description: The format type of the OTP to be typed in. The admitted values
        are "characters" or "integer".
      example: characters
      enum:
        - characters
        - integer
    challengeData:
      title: challengeData
      type: object
      properties:
        image:
          type: string
          description: |-
            PNG data (max. 512 kilobyte) to be displayed to the PSU,
            Base64 encoding, cp. [RFC4648].
            This attribute is used only, when PHOTO_OTP or CHIP_OTP
            is the selected SCA method.
        data:
          type: string
          description: String challenge data
        imageLink:
          type: string
          description: A link where the ASPSP will provides the challenge image for
            the TPP.
        otpMaxLength:
          type: integer
          description: The maximal length for the OTP to be typed in by the PSU.
          format: int32
        otpFormat:
          $ref: '#/components/schemas/OtpFormat'
        additionalInformation:
          type: string
          description: |-
            Additional explanation for the PSU to explain
            e.g. fallback mechanism for the chosen SCA method.
            The TPP is obliged to show this to the PSU.
      description: |-
        It is contained in addition to the data element 'chosenScaMethod' if challenge data is needed for SCA.
        In rare cases this attribute is also used in the context of the 'startAuthorisationWithPsuAuthentication' link.
    _linksAll:
      title: _linksAll
      type: object
      properties:
        scaRedirect:
          $ref: '#/components/schemas/hrefType'
        scaApp2AppIOS:
          $ref: '#/components/schemas/hrefType'
        scaApp2AppAndroid:
          $ref: '#/components/schemas/hrefType'
        scaOAuth:
          $ref: '#/components/schemas/hrefType'
        startAuthorisation:
          $ref: '#/components/schemas/hrefType'
        startAuthorisationWithPsuIdentification:
          $ref: '#/components/schemas/hrefType'
        updatePsuIdentification:
          $ref: '#/components/schemas/hrefType'
        startAuthorisationWithProprietaryData:
          $ref: '#/components/schemas/hrefType'
        updateProprietaryData:
          $ref: '#/components/schemas/hrefType'
        startAuthorisationWithPsuAuthentication:
          $ref: '#/components/schemas/hrefType'
        updatePsuAuthentication:
          $ref: '#/components/schemas/hrefType'
        startAuthorisationWithEncryptedPsuAuthentication:
          $ref: '#/components/schemas/hrefType'
        updateEncryptedPsuAuthentication:
          $ref: '#/components/schemas/hrefType'
        startAuthorisationWithAuthenticationMethodSelection:
          $ref: '#/components/schemas/hrefType'
        selectAuthenticationMethod:
          $ref: '#/components/schemas/hrefType'
        startAuthorisationWithTransactionAuthorisation:
          $ref: '#/components/schemas/hrefType'
        authoriseTransaction:
          $ref: '#/components/schemas/hrefType'
        self:
          $ref: '#/components/schemas/hrefType'
        status:
          $ref: '#/components/schemas/hrefType'
        scaStatus:
          $ref: '#/components/schemas/hrefType'
        account:
          $ref: '#/components/schemas/hrefType'
        balances:
          $ref: '#/components/schemas/hrefType'
        transactions:
          $ref: '#/components/schemas/hrefType'
        transactionDetails:
          $ref: '#/components/schemas/hrefType'
        cardAccount:
          $ref: '#/components/schemas/hrefType'
        cardTransactions:
          $ref: '#/components/schemas/hrefType'
        first:
          $ref: '#/components/schemas/hrefType'
        next:
          $ref: '#/components/schemas/hrefType'
        previous:
          $ref: '#/components/schemas/hrefType'
        last:
          $ref: '#/components/schemas/hrefType'
        download:
          $ref: '#/components/schemas/hrefType'
      description: A _link object with all availabel link types
    _linksPaymentInitiation:
      title: _linksPaymentInitiation
      type: object
      properties:
        scaRedirect:
          $ref: '#/components/schemas/hrefType'
        scaApp2AppIOS:
          $ref: '#/components/schemas/hrefType'
        scaApp2AppAndroid:
          $ref: '#/components/schemas/hrefType'
        scaOAuth:
          $ref: '#/components/schemas/hrefType'
        startAuthorisation:
          $ref: '#/components/schemas/hrefType'
        startAuthorisationWithPsuIdentification:
          $ref: '#/components/schemas/hrefType'
        startAuthorisationWithPsuAuthentication:
          $ref: '#/components/schemas/hrefType'
        startAuthorisationWithEncryptedPsuAuthentication:
          $ref: '#/components/schemas/hrefType'
        startAuthorisationWithAuthenticationMethodSelection:
          $ref: '#/components/schemas/hrefType'
        startAuthorisationWithTransactionAuthorisation:
          $ref: '#/components/schemas/hrefType'
        self:
          $ref: '#/components/schemas/hrefType'
        status:
          $ref: '#/components/schemas/hrefType'
        scaStatus:
          $ref: '#/components/schemas/hrefType'
      description: "A list of hyperlinks to be recognised by the TPP.\nThe actual\
        \ hyperlinks used in the response depend on the dynamical decisions of the\
        \ ASPSP when\nprocessing the request.**Remark:** All links can be relative\
        \ or full links, to be decided by the ASPSP.\nType of links admitted in\
        \ this response, (further links might be added for ASPSP defined extensions):\
        * 'scaRedirect':   In case of an SCA Redirect Approach, the ASPSP is transmitting\
        \ the link to which to redirect the PSU browser.* 'scaApp2AppIOS':   In\
        \ case of an App2App Redirect Approach, the ASPSP is transmitting the link\
        \ to which to redirect the PSU mobile device.* 'scaApp2AppAndroid':  \
        \ In case of an App2App Redirect Approach, the ASPSP is transmitting the link\
        \ to which to redirect the PSU mobile device.* 'scaOAuth':   In case of\
        \ a SCA OAuth2 Approach, the ASPSP is transmitting the URI where the configuration\
        \ of the Authorisation  Server can be retrieved. The configuration follows\
        \ the OAuth 2.0 Authorisation Server Metadata specification.* 'startAuthorisation':\
        \   In case, where an explicit start of the transaction authorisation is\
        \ needed, but no more data needs to be updated   (no authentication method\
        \ to be selected, no PSU identification nor PSU authentication data to be\
        \ uploaded).* 'startAuthorisationWithPsuIdentification':   The link to\
        \ the authorisation end-point, where the authorisation sub-resource has to\
        \ be generated while   uploading the PSU identification data.* 'startAuthorisationWithPsuAuthentication':\
        \   The link to the authorisation end-point, where the authorisation sub-resource\
        \ has to be generated while   uploading the PSU authentication data. \
        \ * 'startAuthorisationWithEncryptedPsuAuthentication':    Same as startAuthorisactionWithPsuAuthentication\
        \ where the authentication data need to be encrypted on     application\
        \ layer in uploading.* 'startAuthorisationWithAuthenticationMethodSelection':\
        \   The link to the authorisation end-point, where the authorisation sub-resource\
        \ has to be generated while   selecting the authentication method.   This\
        \ link is contained under exactly the same conditions as the data element\
        \ \"scaMethods\"* 'startAuthorisationWithTransactionAuthorisation':  The\
        \ link to the authorisation end-point, where the authorisation sub-resource\
        \ has to be generated while   authorising the transaction e.g. by uploading\
        \ an OTP received by SMS.* 'self':   The link to the payment initiation\
        \ resource created by this request.  This link can be used to retrieve the\
        \ resource data.* 'status':   The link to retrieve the transaction status\
        \ of the payment initiation.* 'scaStatus':   The link to retrieve the\
        \ scaStatus of the corresponding authorisation sub-resource.   This link\
        \ is only contained, if an authorisation sub-resource has been already created."
      example:
        scaRedirect: '{"href":"https://www.testbank.com/asdfasdfasdf"}'
