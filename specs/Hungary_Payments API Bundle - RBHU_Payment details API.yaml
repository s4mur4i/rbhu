        remittanceInformationStructured:
          type: string
        creditorAgentName:
          type: string
        chargeBearer:
          $ref: '#/components/schemas/ChargeBearer'
        serviceLevel:
          $ref: '#/components/schemas/ServiceLevel'
        requestedExecutionDate:
