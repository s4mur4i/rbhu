      pattern: -?[0-9]{1,14}(\.[0-9]{1,3})?
      type: string
      example: "5877.78"
    bicfi:
      pattern: '[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}'
      type: string
      description: |
        BICFI
      example: AAAADEBBXXX
