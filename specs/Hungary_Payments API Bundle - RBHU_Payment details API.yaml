    _linksStartScaProcess:
      title: _linksStartScaProcess
      type: object
      properties:
        scaRedirect:
          $ref: '#/components/schemas/hrefType'
        scaApp2AppIOS:
          $ref: '#/components/schemas/hrefType'
        scaApp2AppAndroid:
          $ref: '#/components/schemas/hrefType'
        scaOAuth:
          $ref: '#/components/schemas/hrefType'
