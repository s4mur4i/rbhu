    scaStatusResponse:
      title: scaStatusResponse
      type: object
      properties:
        scaStatus:
          $ref: '#/components/schemas/scaStatus'
      description: Body of the JSON response with SCA Status
    scaStatus:
      title: scaStatus
      type: string
      description: "This data element is containing information about the status of\
        \ the SCA method applied. \n\nThe following codes are defined for this data\
        \ type.\n\n  * 'received':\n    An authorisation or cancellation-authorisation\
        \ resource has been created successfully.\n  * 'psuIdentified':\n    The PSU\
        \ related to the authorisation or cancellation-authorisation resource has\
        \ been identified.\n  * 'psuAuthenticated':\n    The PSU related to the authorisation\
        \ or cancellation-authorisation resource has been identified and authenticated\
        \ e.g. by a password or by an access token.\n  * 'scaMethodSelected':\n  \
        \  The PSU/TPP has selected the related SCA routine. \n    If the SCA method\
        \ is chosen implicitly since only one SCA method is available, \n    then\
        \ this is the first status to be reported instead of 'received'.\n  * 'started':\n\
        \    The addressed SCA routine has been started.\n  * 'finalised':\n    The\
        \ SCA routine has been finalised successfully.\n  * 'failed':\n    The SCA\
        \ routine failed\n  * 'exempted':\n    SCA was exempted for the related transaction,\
        \ the related authorisation is successful."
      example: received
      enum:
        - received
        - psuIdentified
        - psuAuthenticated
        - scaMethodSelected
        - started
        - finalised
        - failed
        - exempted
    authorisations:
      title: authorisations
      required:
        - authorisationIds
      type: object
      properties:
        authorisationIds:
          type: array
          description: An array of all authorisationIds
          items:
            type: string
      description: An array of all authorisationIds
    startScaprocessResponse:
      title: startScaprocessResponse
      required:
        - _links
        - authorisationId
        - scaStatus
      type: object
      properties:
        scaStatus:
          $ref: '#/components/schemas/scaStatus'
        authorisationId:
          type: string
          description: Resource identification of the related SCA
          example: 123auth456
        scaMethods:
          type: array
          description: |-
            This data element might be contained, if SCA is required and if the PSU has a choice between different
            authentication methods.

            Depending on the risk management of the ASPSP this choice might be offered before or after the PSU
            has been identified with the first relevant factor, or if an access token is transported.

            If this data element is contained, then there is also an hyperlink of type 'startAuthorisationWithAuthenticationMethodSelection'
            contained in the response body.

            These methods shall be presented towards the PSU for selection by the TPP.
          items:
            $ref: '#/components/schemas/authenticationObject'
        chosenScaMethod:
          $ref: '#/components/schemas/authenticationObject'
        challengeData:
          $ref: '#/components/schemas/challengeData'
        _links:
          $ref: '#/components/schemas/_linksStartScaProcess'
        psuMessage:
          maxLength: 512
          type: string
          description: Text to be displayed to the PSU
      description: Body of the JSON response for a Start SCA authorisation request.
  securitySchemes:
    clientIdHeader:
      type: apiKey
      name: client_id
      in: header
  parameters:
    PSU-IP-Address:
      name: PSU-IP-Address
      in: header
      description: The forwarded IP Address header field consists of the corresponding
        http request IP Address field between PSU and TPP.
      required: true
      schema:
        type: string
        format: ipv4
      example: '192.168.8.78'
    digest:
      name: Digest
      in: header
      description: |-
        The digest is a base64 encoded hash of the body.
        Hash the body of your request (or an empty string if there is no body) using the SHA-256 algorithm.
        Base64 encode the output and add the result to your Digest header, specifying the hashing algorithm used.
      schema:
        type: string
      example: SHA-256=ZuYiOtZkVxhjWmwTO5lOpsPevUNMezvk6dfb6fVhebM=
    signature:
      name: Signature
      in: header
      description: |-
        A signature of the request by the TPP at the application level. This might be mandated by the ASPSP. 
        The signature is a list of headers with their signed values. Any header can be used in the signature (including the `Digest` header), with the exception of the `client_id` header. 
        To sign the `client_id` header, its name should be treated as `clientId`.
        First, prepare the headers in the format of "header name: header value" with a line separator, e.g.,
        ```
        Digest: SHA-256=ZuYiOtZkVxhjWmwTO5lOpsPevUNMezvk6dfb6fVhebM=
        clientId: WmwTO5lOpsPevUNMezvk6df
        ```
        Then, sign this string using your private key and hash it with SHA-256 using RSA.
        Finally, base64 encode the resulting value. The `Signature` header should include the `keyId`, `algorithm="rsa-sha256"`, `headers` list, and the base64 encoded signature.
      example: |-
        keyId="SN=9FA1,CA=D-TRUST%20CA%202-1%202015,O=D-Trust%20GmbH,C=DE",algorithm="rsa-sha256",
        headers="Digest clientId",
        signature="Base64(RSA-SHA256(signing string))"
      schema:
        type: string
    tpp-signature-certificate:
      name: TPP-Signature-Certificate
      in: header
      description: |-
        The certificate used for signing the request, in base64 encoding.
        Must be included if a signature is present. The request must be signed with your QSEAL certificate.
        The algorithm used for the signature must be RSA-SHA256. If this header is present, the `Signature` and `Digest` headers must also be provided.
      schema:
        type: string
      example: MIIHXTCCBUWgAwIBAgIMIgFezw5y5yKRhs9TMA0GCSqGSIb3DQEBCwUAMGUxCzACORgEBMBMGBgQAjkYBBjAJBgcEAI5GAQYCMDQGBgQAjkYBBTAqMCgWImh0dHBzOi8vd3d3LmNlcnRzaWduLnJvL3JlcG9z...