        this deletion.Remark: The signing basket as such is not deletable after
        a first (partial) authorisation has been applied. \nNevertheless, single
        transactions might be cancelled on an individual basis on the XS2A interface."
      operationId: cancelSigningBasket
      x-kong-plugin-request-validator:
        enabled: true
