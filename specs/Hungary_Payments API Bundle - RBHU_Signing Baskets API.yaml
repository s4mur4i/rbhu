  /signing-baskets/{basketId}/status:
    get:
      tags:
        - Signing Basket Service (SBS)
      summary: Read the status of the signing basket
      description: Returns the status of a signing basket object.
      operationId: getSigningBasketStatus
      x-kong-plugin-request-validator:
        enabled: true
      parameters:
        - name: basketId
          in: path
          description: Resource identification of the generated basket initiation resource.
          required: true
          schema:
            type: string
        - name: X-Request-ID
          in: header
          description: ID of the request, unique to the call, as determined by the initiating
            party.
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/digest'
        - $ref: '#/components/parameters/signature'
        - $ref: '#/components/parameters/tpp-signature-certificate'
        - name: PSU-ID
          in: header
