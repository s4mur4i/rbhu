          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error405_NG_SBS'
        406:
          description: Not Acceptable
          content:
            application/json:
              schema:
                type: object
        408:
          description: Request Timeout
          content:
            application/json:
              schema:
                type: object
        409:
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error409_NG_SBS'
        415:
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                type: object
        429:
