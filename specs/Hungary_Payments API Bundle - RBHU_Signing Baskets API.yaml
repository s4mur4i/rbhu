      deprecated: false
components:
  schemas:
    psuMessageText:
      maxLength: 512
      type: string
      description: Text to be displayed to the PSU
    _linksSigningBasket:
      type: object
      properties:
        scaRedirect:
          $ref: '#/components/schemas/hrefType'
        scaOAuth:
          $ref: '#/components/schemas/hrefType'
        startAuthorisation:
          $ref: '#/components/schemas/hrefType'
        startAuthorisationWithPsuIdentification:
          $ref: '#/components/schemas/hrefType'
        startAuthorisationWithPsuAuthentication:
          $ref: '#/components/schemas/hrefType'
        startAuthorisationWithEncryptedPsuAuthentication:
          $ref: '#/components/schemas/hrefType'
        startAuthorisationWithAuthenticationMethodSelection:
          $ref: '#/components/schemas/hrefType'
        startAuthorisationWithTransactionAuthorisation:
          $ref: '#/components/schemas/hrefType'
        self:
          $ref: '#/components/schemas/hrefType'
        status:
          $ref: '#/components/schemas/hrefType'
        scaStatus:
          $ref: '#/components/schemas/hrefType'
        new-property-1:
          $ref: '#/components/schemas/hrefType'
      description: "A list of hyperlinks to be recognised by the TPP. The actual hyperlinks\
        \ used in the\n\t  response depend on the dynamical decisions of the ASPSP\
        \ when processing the request.\n\t    * 'scaRedirect':\n\t\t  In case of an\
        \ SCA Redirect Approach, the ASPSP is transmitting the link to\n\t\t  which\
        \ to redirect the PSU browser.\n\t    * 'scaOAuth':\n\t\t  In case of a SCA\
        \ OAuth2 Approach, the ASPSP is transmitting the URI where the configuration\
        \ of\n\t\t  the Authorisation Server can be retrieved. The configuration follows\
        \ the\n\t\t  OAuth 2.0 Authorisation Server Metadata specification.\n\t  \
        \  * 'startAuthorisation':\n\t\t  In case, where an explicit start of the\
        \ transaction authorisation is needed,\n\t\t  but no more data needs to be\
        \ updated (no authentication method to be selected,\n\t\t  no PSU identification\
        \ nor PSU authentication data to be uploaded).\n\t    * 'startAuthorisationWithPsuIdentification':\n\
        \t\t  The link to the authorisation end-point, where the authorisation sub-resource\n\
        \t\t  has to be generated while uploading the PSU identification data.\n\t\
        \    * 'startAuthorisationWithPsuAuthentication':\n\t\t  The link to the authorisation\
        \ end-point, where the authorisation sub-resource\n\t\t  has to be generated\
        \ while uploading the PSU authentication data.\n\t    * 'startAuthorisationWithEncryptedPsuAuthentication':\n\
        \t\t  The link to the authorisation end-point, where the authorisation sub-resource\
        \ has\n\t\t  to be generated while uploading the encrypted PSU authentication\
        \ data.\n\t    * 'startAuthorisationWithAuthenticationMethodSelection':\n\t\
        \t  The link to the authorisation end-point, where the authorisation sub-resource\n\
        \t\t  has to be generated while selecting the authentication method.\n\t\t\
        \  This link is contained under exactly the same conditions as the data element\
        \ 'scaMethods'\n\t    * 'startAuthorisationWithTransactionAuthorisation':\n\
        \t\t  The link to the authorisation end-point, where the authorisation sub-resource\n\
        \t\t  has to be generated while authorising the transaction e.g. by uploading\
        \ an\n\t\t  OTP received by SMS.\n\t    * 'self':\n\t\t  The link to the payment\
        \ initiation resource created by this request.\n\t\t  This link can be used\
        \ to retrieve the resource data.\n\t    * 'status':\n\t\t  The link to retrieve\
        \ the transaction status of the payment initiation.\n\t    * 'scaStatus':\n\
        \t\t  The link to retrieve the scaStatus of the corresponding authorisation\
        \ sub-resource.\n\t\t  This link is only contained, if an authorisation sub-resource\
        \ has been already created."
    basketId:
      type: string
      description: Resource identification of the generated signing basket resource.
      example: 1234-basket-567
    transactionStatus_SBS:
      type: string
      description: |
        The transaction status is filled with codes of the ISO 20022 data table.
        - 'ACSP': 'AcceptedSettlementInProcess' -
          All preceding checks such as technical validation and customer profile were successful and therefore the payment initiation has been accepted for execution.
        - 'ACTC': 'AcceptedTechnicalValidation' -
          Authentication and syntactical and semantical validation are successful.
        - 'ACWC': 'AcceptedWithChange' -
          Instruction is accepted but a change will be made, such as date or remittance not sent.
        - 'RCVD': 'Received' -
          Payment initiation has been received by the receiving agent.
        - 'RJCT': 'Rejected' -
          Payment initiation or individual transaction included in the payment initiation has been rejected.
      example: RCVD
      enum:
        - ACSC
        - ACTC
        - ACWC
        - RCVD
        - RJCT
    BasketPaymentInitResponseList:
      title: BasketPaymentInitResponseList
      required:
        - payments
      type: object
      properties:
        payments:
          type: array
          description: ""
          items:
            $ref: '#/components/schemas/paymentIdList'
        transactionStatus:
          $ref: '#/components/schemas/transactionStatus_SBS'
    signingBasketResponse-201:
      type: object
      properties:
        transactionStatus:
          $ref: '#/components/schemas/transactionStatus_SBS'
        basketId:
          $ref: '#/components/schemas/basketId'
        scaMethods:
          $ref: '#/components/schemas/scaMethods'
        chosenScaMethod:
          $ref: '#/components/schemas/chosenScaMethod'
        challengeData:
          $ref: '#/components/schemas/challengeData'
        _links:
          $ref: '#/components/schemas/_linksSigningBasket'
        psuMessage:
          $ref: '#/components/schemas/psuMessageText'
        tppMessages:
          type: array
          items:
            $ref: '#/components/schemas/tppMessage2XX'
      description: Body of the JSON response for a successful create signing basket
        request.
    OK_200_SigningBasketStatus:
      type: object
      properties:
        transactionStatus:
          $ref: '#/components/schemas/transactionStatus_SBS'
      description: OK
    signingBasket:
      type: object
      properties:
        paymentIds:
          $ref: '#/components/schemas/paymentIdList'
        consentIds:
          $ref: '#/components/schemas/consentIdList'
      description: JSON Body of a establish signing basket request. The body shall
        contain at least one entry.
    paymentIdList:
      minItems: 1
      type: array
      description: A list of paymentIds
      items:
        $ref: '#/components/schemas/paymentId'
    consentIdList:
      minItems: 1
      type: array
      description: A list of consentIds
      items:
        $ref: '#/components/schemas/consentId'
    paymentId:
      type: string
      description: Resource identification of the generated payment initiation resource.
      example: 1234-wertiq-983
    consentId:
      type: string
      description: ID of the corresponding consent object as returned by an Account
        Information Consent Request.
    authenticationObject:
      title: authenticationObject
      required:
        - authenticationMethodId
        - authenticationType
      type: object
      properties:
        authenticationType:
          $ref: '#/components/schemas/authenticationType'
        authenticationVersion:
          type: string
          description: |-
            Depending on the "authenticationType".
            This version can be used by differentiating authentication tools used within performing OTP generation in the same authentication type.
            This version can be referred to in the ASPSP?s documentation.
        authenticationMethodId:
          maxLength: 35
          type: string
          description: An identification provided by the ASPSP for the later identification
            of the authentication method selection.
          example: myAuthenticationID
        name:
          type: string
          description: |-
            This is the name of the authentication method defined by the PSU in the Online Banking frontend of the ASPSP.
            Alternatively this could be a description provided by the ASPSP like "SMS OTP on phone +49160 xxxxx 28".
            This name shall be used by the TPP when presenting a list of authentication methods to the PSU, if available.
          example: SMS OTP on phone +49160 xxxxx 28
        explanation:
          type: string
          description: Detailed information about the SCA method for the PSU.
          example: Detailed information about the SCA method for the PSU.
      description: Authentication Object
    authenticationType:
      title: authenticationType
      type: string
      description: "Type of the authentication method.\n\nMore authentication types\
        \ might be added during implementation projects and documented in the ASPSP\
        \ documentation.\n\n  - 'SMS_OTP': An SCA method, where an OTP linked to the\
        \ transaction to be authorised is sent to the PSU through a SMS channel.\n\
        \  - 'CHIP_OTP': An SCA method, where an OTP is generated by a chip card,\
        \ e.g. an TOP derived from an EMV cryptogram. \n    To contact the card, the\
        \ PSU normally needs a (handheld) device. \n    With this device, the PSU\
        \ either reads the challenging data through a visual interface like flickering\
        \ or \n    the PSU types in the challenge through the device key pad. \n \
        \   The device then derives an OTP from the challenge data and displays the\
        \ OTP to the PSU.\n  - 'PHOTO_OTP': An SCA method, where the challenge is\
        \ a QR code or similar encoded visual data \n    which can be read in by a\
        \ consumer device or specific mobile app. \n    The device resp. the specific\
        \ app than derives an OTP from the visual challenge data and displays \n \
        \   the OTP to the PSU.\n  - 'PUSH_OTP': An OTP is pushed to a dedicated authentication\
        \ APP and displayed to the PSU."
      example: SMS_OTP
      enum:
        - SMS_OTP
        - CHIP_OTP
        - PHOTO_OTP
        - PUSH_OTP
    challengeData:
      title: challengeData
      type: object
      properties:
        image:
          type: string
          description: |-
            PNG data (max. 512 kilobyte) to be displayed to the PSU,
            Base64 encoding, cp. [RFC4648].
            This attribute is used only, when PHOTO_OTP or CHIP_OTP
            is the selected SCA method.
        data:
          type: string
          description: String challenge data
        imageLink:
          type: string
          description: A link where the ASPSP will provides the challenge image for
            the TPP.
        otpMaxLength:
          type: integer
          description: The maximal length for the OTP to be typed in by the PSU.
          format: int32
        otpFormat:
          $ref: '#/components/schemas/OtpFormat'
        additionalInformation:
          type: string
          description: |-
            Additional explanation for the PSU to explain
            e.g. fallback mechanism for the chosen SCA method.
            The TPP is obliged to show this to the PSU.
      description: |-
        It is contained in addition to the data element 'chosenScaMethod' if challenge data is needed for SCA.
        In rare cases this attribute is also used in the context of the 'startAuthorisationWithPsuAuthentication' link.
    chosenScaMethod:
      type: object
      description: |
        This data element is only contained in the response if the APSPS has chosen the Embedded SCA Approach,
        if the PSU is already identified e.g. with the first relevant factor or alternatively an access token,
        if SCA is required and if the authentication method is implicitly selected.
        $ref: '#/definitions/authenticationObject'
    scaMethods:
      type: array
      description: |
        This data element might be contained, if SCA is required and if the PSU has a choice between different
        authentication methods.

        Depending on the risk management of the ASPSP this choice might be offered before or after the PSU
        has been identified with the first relevant factor, or if an access token is transported.

        If this data element is contained, then there is also an hyperlink of type 'startAuthorisationWithAuthenticationMethodSelection'
        contained in the response body.

        These methods shall be presented towards the PSU for selection by the TPP.
      items:
        $ref: '#/components/schemas/authenticationObject'
