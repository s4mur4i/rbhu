openapi: 3.0.1
x-kong-name: psd2-signing-baskets-api-132
info:
  title: Signing Baskets API
  version: 1.3.2
externalDocs:
  description: |-
    Full Documentation of NextGenPSD2 Access to Account Interoperability Framework
    (General Introduction Paper, Operational Rules, Implementation Guidelines)
  url: https://www.berlin-group.org/nextgenpsd2-downloads
servers:
  - url: https://hu-api-sandbox.raiffeisen.hu/rbhu/prod02/psd2-signing-baskets-api-1.3.2/v1/

security:
- clientIdHeader: []
tags: []
paths:
  /signing-baskets:
    post:
      tags:
        - Signing Basket Service (SBS)
      summary: Create a signing basket resource
      description: Create a signing basket resource for authorising several transactions
        with one SCA method.
      operationId: createSigningBasket
      x-kong-plugin-request-validator:
        enabled: true
      parameters:
        - name: X-Request-ID
          in: header
          description: ID of the request, unique to the call, as determined by the initiating
            party.
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/digest'
        - $ref: '#/components/parameters/signature'
        - $ref: '#/components/parameters/tpp-signature-certificate'
        - name: PSU-ID
          in: header
          description: >-
            Client ID of the PSU in the ASPSP client
            interface.
            It is mandated by the Raiffeisen Bank to be required field if the PSU-Corporate-ID is not provided.
            It might be contained even if an OAuth2 based authentication was performed in a
            pre-step In this case the ASPSP might
            check whether PSU-ID and token match,
            according to ASPSP documentation.
          schema:
            type: string
        - name: PSU-ID-Type
          in: header
          description: Type of the PSU-ID, needed in scenarios where PSUs have several
            PSU-IDs as access possibility.
          schema:
            type: string
        - name: PSU-Corporate-ID
          in: header
          description: It is mandated by the Raiffeisen Bank to be required field if the PSU-ID is not provided.
          schema:
            type: string
        - name: PSU-Corporate-ID-Type
          in: header
          description: Might be mandated in the ASPSP's documentation. Only used in
            a corporate context.
          schema:
            type: string
        - name: Consent-ID
          in: header
          description: This data element may be contained, if the payment initiation
            transaction is part of a session, i.e. combined AIS/PIS service.
          schema:
            type: string
        - $ref: "#/components/parameters/PSU-IP-Address"
        - name: TPP-Redirect-Preferred
          in: header
          description: If it equals "true", the TPP prefers a redirect over an embedded
            SCA approach. If it equals "false", the TPP prefers not to be redirected
            for SCA.
          schema:
            type: string
        - name: TPP-Redirect-URI
          in: header
          description: |-
            URI of the URI of the TPP, where the transaction
              flow shall be redirected to after a
              Redirect. Mandated for the Redirect SCA
              Approach, specifically when TPP-Redirect-
              Preferred equals "true". See Section 4.10 for
              further requirements on this header.
              It is recommended to always use this header
              field.
          schema:
            type: string
        - name: TPP-Nok-Redirect-URI
          in: header
          description: If this URI is contained, the TPP is asking to redirect the transaction
            flow to this address instead of the TPP-Redirect-URI in case of a negative
            result of the redirect SCA method.
          schema:
            type: string
        - name: TPP-Explicit-Authorisation-Preferred
          in: header
          description: If it equals "true", the TPP prefers to start the authorisation
            process separately, e.g. because of the usage of a signing basket.
          schema:
            type: string
        - name: PSU-IP-Port
          in: header
          description: The forwarded IP Port header field consists of the corresponding
            HTTP request IP Port field between PSU and TPP, if available.
          schema:
            type: string
        - name: PSU-Accept
          in: header
          description: The forwarded IP Accept header fields consist of the corresponding
            HTTP request Accept header fields between PSU and TPP, if available.
          schema:
            type: string
        - name: PSU-Accept-Charset
          in: header
          description: The forwarded IP Accept header fields consist of the corresponding
            HTTP request Accept header fields between PSU and TPP, if available.
          schema:
            type: string
        - name: PSU-Accept-Encoding
          in: header
          description: The forwarded IP Accept header fields consist of the corresponding
            HTTP request Accept header fields between PSU and TPP, if available.
          schema:
            type: string
        - name: PSU-Accept-Language
          in: header
          description: The forwarded IP Accept header fields consist of the corresponding
            HTTP request Accept header fields between PSU and TPP, if available.
          schema:
            type: string
        - name: PSU-User-Agent
          in: header
          description: |-
            The forwarded Agent header field of the HTTP request between
            PSU and TPP, if available.
            Examples
              * Android:  "Myappa/1.2 Dalvik/2.1.0 (Linux; U; Android 6.0.1; vivo 1610 Build/MMB29M)"
              * iOS: "MyApp/1 iPhone5,2 iOS/10_1 CFNetwork/808.3 Darwin/16.3.0"
          schema:
            type: string
        - name: PSU-Http-Method
          in: header
          description: |-
            HTTP method used at the PSU ? TPP interface, if available.
            Valid values are:
            * GET
            * POST
            * PUT
            * PATCH
            * DELETE
          schema:
            type: string
            enum:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
        - name: PSU-Device-ID
          in: header
          description: |-
            UUID (Universally Unique Identifier) for a device, which is used by the PSU, if available.
            UUID identifies either a device or a device dependant application installation.
            In case of an installation identification this ID need to be unaltered until removal from device.
          schema:
            type: string
            format: uuid
        - name: PSU-Geo-Location
          in: header
          description: The forwarded Geo Location of the corresponding http request
            between PSU and TPP if available.
          schema:
            pattern: GEO:-?[0-9]{1,2}\.[0-9]{6};-?[0-9]{1,3}\.[0-9]{6}
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/signingBasket'
        required: false
      responses:
        201:
          description: Created
          headers:
            X-Request-ID:
              description: ID of the request, unique to the call, as determined by
                the initiating party.
              schema:
                type: string
                format: uuid
            ASPSP-SCA-Approach:
              description: |
                This data element must be contained, if the SCA Approach is already fixed.
                Possible values are
                  * EMBEDDED
                  * DECOUPLED
                  * REDIRECT
                The OAuth SCA approach will be subsumed by REDIRECT.
              schema:
                type: string
                enum:
                  - EMBEDDED
                  - DECOUPLED
                  - REDIRECT
            Location:
              description: Location of the created resource.
              schema:
                type: string
                format: url
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/signingBasketResponse-201'
        400:
          description: Bad Request
          headers:
            X-Request-ID:
              description: ID of the request, unique to the call, as determined by
                the initiating party.
              schema:
                type: string
                format: uuid
            Location:
              description: Location of the created resource.
              schema:
                type: string
                format: url
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400_NG_SBS'
        401:
          description: Unauthorized
          headers:
            X-Request-ID:
              description: ID of the request, unique to the call, as determined by
                the initiating party.
              schema:
                type: string
                format: uuid
            Location:
              description: Location of the created resource.
              schema:
                type: string
                format: url
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error401_NG_SBS'
        403:
          description: Forbidden
          headers:
            X-Request-ID:
              description: ID of the request, unique to the call, as determined by
                the initiating party.
              schema:
                type: string
                format: uuid
            Location:
              description: Location of the created resource.
              schema:
                type: string
                format: url
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error403_NG_SBS'
        404:
          description: Not found
          headers:
            X-Request-ID:
              description: ID of the request, unique to the call, as determined by
                the initiating party.
              schema:
                type: string
                format: uuid
            Location:
