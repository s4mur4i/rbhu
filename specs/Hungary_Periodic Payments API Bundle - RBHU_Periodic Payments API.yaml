components:
  parameters:
    authorisationId:
      name: authorisationId
      in: path
      description: Resource identification of the related SCA.
      required: true
      schema:
        type: string
    payment-service:
      name: paymentService
      required: true
      in: path
      schema:
        type: string
        enum:
          - periodic-payments
    payment-product:
      name: paymentProduct
      in: path
      required: true
      schema:
        type: string
        enum:
          - domestic
          - sepa-credit-transfers
          - cross-border-credit-transfers
          - domestic-credit-transfers-hr
          - hr-rtgs-payments
    paymentId:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
    x-request-id:
      name: X-Request-ID
      schema:
        type: string
        format: uuid
      required: true
      in: header
      description: ID of the request, unique to the call, as determined by the initiating
        party.
    digest:
      name: Digest
      in: header
      description: |-
        The digest is a base64 encoded hash of the body.
        Hash the body of your request (or an empty string if there is no body) using the SHA-256 algorithm.
        Base64 encode the output and add the result to your Digest header, specifying the hashing algorithm used.
      schema:
        type: string
      example: SHA-256=ZuYiOtZkVxhjWmwTO5lOpsPevUNMezvk6dfb6fVhebM=
    signature:
      name: Signature
      in: header
      description: |-
        A signature of the request by the TPP at the application level. This might be mandated by the ASPSP. 
        The signature is a list of headers with their signed values. Any header can be used in the signature (including the `Digest` header), with the exception of the `client_id` header. 
        To sign the `client_id` header, its name should be treated as `clientId`.
        First, prepare the headers in the format of "header name: header value" with a line separator, e.g.,
        ```
        Digest: SHA-256=ZuYiOtZkVxhjWmwTO5lOpsPevUNMezvk6dfb6fVhebM=
        clientId: WmwTO5lOpsPevUNMezvk6df
        ```
        Then, sign this string using your private key and hash it with SHA-256 using RSA.
        Finally, base64 encode the resulting value. The `Signature` header should include the `keyId`, `algorithm="rsa-sha256"`, `headers` list, and the base64 encoded signature.
      example: |-
        keyId="SN=9FA1,CA=D-TRUST%20CA%202-1%202015,O=D-Trust%20GmbH,C=DE",algorithm="rsa-sha256",
        headers="Digest clientId",
        signature="Base64(RSA-SHA256(signing string))"
      schema:
        type: string
    tpp-signature-certificate:
      name: TPP-Signature-Certificate
      in: header
      description: |-
        The certificate used for signing the request, in base64 encoding.
        Must be included if a signature is present. The request must be signed with your QSEAL certificate.
        The algorithm used for the signature must be RSA-SHA256. If this header is present, the `Signature` and `Digest` headers must also be provided.
      schema:
        type: string
      example: MIIHXTCCBUWgAwIBAgIMIgFezw5y5yKRhs9TMA0GCSqGSIb3DQEBCwUAMGUxCzACORgEBMBMGBgQAjkYBBjAJBgcEAI5GAQYCMDQGBgQAjkYBBTAqMCgWImh0dHBzOi8vd3d3LmNlcnRzaWduLnJvL3JlcG9z...
    psu-ip-address:
      name: PSU-IP-Address
      in: header
      description: "The forwarded IP Address header field consists of the corresponding\
        \ HTTP request \nIP Address field between PSU and TPP. \nIt shall be contained\
        \ if and only if this request was actively initiated by the PSU."
      schema:
        type: string
    psu-ip-port:
      name: PSU-IP-Port
      in: header
      description: The forwarded IP Port header field consists of the corresponding
        HTTP request IP Port field between PSU and TPP, if available.
      schema:
        type: string
    psu-accept:
      name: PSU-Accept
      in: header
      description: The forwarded IP Accept header fields consist of the corresponding
        HTTP request Accept header fields between PSU and TPP, if available.
      schema:
        type: string
    psu-accept-charset:
      name: PSU-Accept-Charset
      in: header
      description: The forwarded IP Accept header fields consist of the corresponding
        HTTP request Accept header fields between PSU and TPP, if available.
      schema:
        type: string
    psu-accept-encoding:
      name: PSU-Accept-Encoding
      in: header
      description: The forwarded IP Accept header fields consist of the corresponding
        HTTP request Accept header fields between PSU and TPP, if available.
      schema:
        type: string
    psu-accept-language:
      name: PSU-Accept-Language
      in: header
      description: The forwarded IP Accept header fields consist of the corresponding
        HTTP request Accept header fields between PSU and TPP, if available.
      schema:
        type: string
    psu-user-agent:
      name: PSU-User-Agent
      in: header
      description: |-
        The forwarded Agent header field of the HTTP request between
        PSU and TPP, if available.
        Examples
          * Android:  "Myappa/1.2 Dalvik/2.1.0 (Linux; U; Android 6.0.1; vivo 1610 Build/MMB29M)"
          * iOS: "MyApp/1 iPhone5,2 iOS/10_1 CFNetwork/808.3 Darwin/16.3.0"
      schema:
        type: string
    psu-http-method:
      name: PSU-Http-Method
      in: header
      description: |-
        HTTP method used at the PSU ? TPP interface, if available.
        Valid values are:
        * GET
        * POST
        * PUT
        * PATCH
        * DELETE
      schema:
        type: string
        enum:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
    psu-device-id:
      name: PSU-Device-ID
      in: header
      description: |-
        UUID (Universally Unique Identifier) for a device, which is used by the PSU, if available.
        UUID identifies either a device or a device dependant application installation.
        In case of an installation identification this ID need to be unaltered until removal from device.
      schema:
        type: string
        format: uuid
    psu-geo-location:
      name: PSU-Geo-Location
      in: header
      description: The forwarded Geo Location of the corresponding http request
        between PSU and TPP if available.
      schema:
        pattern: (GEO:)[0-9]{1,3}\.[-][0-9]{6}\,[-][0-9]{1,3}\.[0-9]{6}
        type: string
  schemas:
    transactionStatus:
      title: transactionStatus
      type: string
      description: "The transaction status is filled with codes of the ISO 20022 data\
        \ table:\n- 'ACCC': 'AcceptedSettlementCompleted' -\n  Settlement on the creditor's\
        \ account has been completed.\n- 'ACCP': 'AcceptedCustomerProfile' - \n  Preceding\
        \ check of technical validation was successful. \n  Customer profile check\
        \ was also successful.\n- 'ACSC': 'AcceptedSettlementCompleted' - \n  Settlement\
        \ on the debtor?s account has been completed.\n  \n  **Usage:** this can be\
        \ used by the first agent to report to the debtor that the transaction has\
        \ been completed. \n  \n  **Warning:** this status is provided for transaction\
        \ status reasons, not for financial information. \n  It can only be used after\
        \ bilateral agreement.\n- 'ACSP': 'AcceptedSettlementInProcess' - \n  All\
        \ preceding checks such as technical validation and customer profile were\
        \ successful and therefore the payment initiation has been accepted for execution.\n\
        - 'ACTC': 'AcceptedTechnicalValidation' - \n  Authentication and syntactical\
        \ and semantical validation are successful.\n- 'ACWC': 'AcceptedWithChange'\
        \ - \n  Instruction is accepted but a change will be made, such as date or\
        \ remittance not sent.\n- 'ACWP': 'AcceptedWithoutPosting' - \n  Payment instruction\
        \ included in the credit transfer is accepted without being posted to the\
        \ creditor customer?s account.\n- 'RCVD': 'Received' - \n  Payment initiation\
        \ has been received by the receiving agent.\n- 'PDNG': 'Pending' - \n  Payment\
        \ initiation or individual transaction included in the payment initiation\
        \ is pending. \n  Further checks and status update will be performed.\n- 'RJCT':\
        \ 'Rejected' - \n  Payment initiation or individual transaction included in\
        \ the payment initiation has been rejected.\n- 'CANC': 'Cancelled'\n  Payment\
        \ initiation has been cancelled before execution\n  Remark: This code is still\
        \ requested from ISO20022.\n- 'ACFC': 'AcceptedFundsChecked' -\n  Preceeding\
        \ check of technical validation and customer profile was successful and an\
        \ automatic funds check was positive .\n  Remark: This code is still requested\
        \ from ISO20022.\n- 'PATC': 'PartiallyAcceptedTechnical'\n  Correct The payment\
        \ initiation needs multiple authentications, where some but not yet all have\
        \ been performed. Syntactical and semantical validations are successful.\n\
        \  Remark: This code is still requested from ISO20022."
      example: ACCC
      enum:
        - ACCC
        - ACCP
        - ACSC
        - ACSP
        - ACTC
        - ACWC
        - ACWP
        - RCVD
        - PDNG
        - RJCT
        - CANC
        - ACFC
        - PATC
    authenticationObject:
      title: authenticationObject
      required:
        - authenticationMethodId
        - authenticationType
      type: object
      properties:
        authenticationType:
          $ref: '#/components/schemas/authenticationType'
        authenticationVersion:
          type: string
          description: |-
            Depending on the "authenticationType".
            This version can be used by differentiating authentication tools used within performing OTP generation in the same authentication type.
            This version can be referred to in the ASPSP?s documentation.
        authenticationMethodId:
          maxLength: 35
          type: string
          description: An identification provided by the ASPSP for the later identification
            of the authentication method selection.
          example: myAuthenticationID
        name:
          type: string
          description: |-
            This is the name of the authentication method defined by the PSU in the Online Banking frontend of the ASPSP.
            Alternatively this could be a description provided by the ASPSP like "SMS OTP on phone +49160 xxxxx 28".
            This name shall be used by the TPP when presenting a list of authentication methods to the PSU, if available.
          example: SMS OTP on phone +49160 xxxxx 28
        explanation:
          type: string
          description: Detailed information about the SCA method for the PSU.
          example: Detailed information about the SCA method for the PSU.
      description: Authentication Object
    authenticationType:
      title: authenticationType
      type: string
      description: "Type of the authentication method.\n\nMore authentication types\
        \ might be added during implementation projects and documented in the ASPSP\
        \ documentation.\n\n  - 'SMS_OTP': An SCA method, where an OTP linked to the\
        \ transaction to be authorised is sent to the PSU through a SMS channel.\n\
        \  - 'CHIP_OTP': An SCA method, where an OTP is generated by a chip card,\
        \ e.g. an TOP derived from an EMV cryptogram. \n    To contact the card, the\
        \ PSU normally needs a (handheld) device. \n    With this device, the PSU\
        \ either reads the challenging data through a visual interface like flickering\
        \ or \n    the PSU types in the challenge through the device key pad. \n \
        \   The device then derives an OTP from the challenge data and displays the\
        \ OTP to the PSU.\n  - 'PHOTO_OTP': An SCA method, where the challenge is\
        \ a QR code or similar encoded visual data \n    which can be read in by a\
        \ consumer device or specific mobile app. \n    The device resp. the specific\
        \ app than derives an OTP from the visual challenge data and displays \n \
        \   the OTP to the PSU.\n  - 'PUSH_OTP': An OTP is pushed to a dedicated authentication\
        \ APP and displayed to the PSU."
      example: SMS_OTP
      enum:
        - SMS_OTP
        - CHIP_OTP
        - PHOTO_OTP
        - PUSH_OTP
    challengeData:
      title: challengeData
      type: object
      properties:
        image:
          type: string
          description: |-
            PNG data (max. 512 kilobyte) to be displayed to the PSU,
            Base64 encoding, cp. [RFC4648].
            This attribute is used only, when PHOTO_OTP or CHIP_OTP
            is the selected SCA method.
        data:
          type: string
          description: String challenge data
        imageLink:
          type: string
          description: A link where the ASPSP will provides the challenge image for
            the TPP.
        otpMaxLength:
          type: integer
          description: The maximal length for the OTP to be typed in by the PSU.
          format: int32
        otpFormat:
          $ref: '#/components/schemas/OtpFormat'
        additionalInformation:
          type: string
          description: |-
            Additional explanation for the PSU to explain
            e.g. fallback mechanism for the chosen SCA method.
            The TPP is obliged to show this to the PSU.
      description: |-
        It is contained in addition to the data element 'chosenScaMethod' if challenge data is needed for SCA.
        In rare cases this attribute is also used in the context of the 'startAuthorisationWithPsuAuthentication' link.
    accountReference:
      title: accountReference
      type: object
      properties:
        iban:
          pattern: '[A-Z]{2,2}[0-9]{2,2}[a-zA-Z0-9]{1,30}'
          type: string
          description: IBAN of an account
          example: FR7612345987650123456789014
        bban:
          pattern: '[a-zA-Z0-9]{1,30}'
          type: string
          description: "Basic Bank Account Number (BBAN) Identifier\n\nThis data element\
            \ can be used in the body of the Consent Request\n  Message for retrieving\
            \ Account access Consent from this Account. This\n  data elements is used\
            \ for payment Accounts which have no IBAN.\n  ISO20022: Basic Bank Account\
            \ Number (BBAN). \n  \n  Identifier used nationally by financial institutions,\
            \ i.e., in individual countries, \n  generally as part of a National Account\
            \ Numbering Scheme(s), \n  which uniquely identifies the account of a\
            \ customer."
          example: BARC12345612345678
        pan:
          maxLength: 35
          type: string
          description: Primary Account Number according to ISO/IEC 7812.
          example: "5409050000000000"
        maskedPan:
          maxLength: 35
          type: string
          description: Masked Primary Account Number
          example: 123456xxxxxx1234
        msisdn:
          maxLength: 35
          type: string
          description: Mobile phone number.
          example: +49 170 1234567
        currency:
          pattern: '[A-Z]{3}'
          type: string
          description: ISO 4217 Alpha 3 currency code
          example: EUR
      description: "Reference to an account by either\n  * IBAN, of a payment accounts,\
        \ or\n  * BBAN, for payment accounts if there is no IBAN, or \n  * the Primary\
        \ Account Number (PAN) of a card, can be tokenised by the ASPSP due to PCI\
        \ DSS requirements, or\n  * the Primary Account Number (PAN) of a card in\
        \ a masked form, or\n  * an alias to access a payment account via a registered\
        \ mobile phone number (MSISDN)."
    address:
      title: address
      required:
        - country
      type: object
      properties:
        street:
          maxLength: 70
          type: string
        buildingNumber:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          pattern: '[A-Z]{2}'
          type: string
          description: ISO 3166 ALPHA2 country code
          example: SE
      example:
        street: rue blue
        buildingnNumber: "89"
        city: Paris
        postalCode: "75000"
        country: FR
    chargeBearer:
      type: string
      description: Charge Bearer. ChargeBearerType1Code from ISO20022
      enum:
        - DEBT
        - CRED
        - SHAR
        - SLEV
    creditorAgentName:
      maxLength: 70
      type: string
      description: Creditor Agent Name
      example: Creditor Agent Name
    amount:
      title: amount
      required:
        - amount
        - currency
      type: object
      properties:
        currency:
          pattern: '[A-Z]{3}'
          type: string
          description: ISO 4217 Alpha 3 currency code
          example: EUR
        amount:
          pattern: -?[0-9]{1,14}(\.[0-9]{1,3})?
          type: string
          description: |-
            The amount given with fractional digits, where fractions must be compliant to the currency definition.
            Up to 14 significant figures. Negative amounts are signed by minus.
            The decimal separator is a dot.

            **Example:**
            Valid representations for EUR with up to two decimals are:

              * 1056
              * 5768.2
              * -1.50
              * 5877.78
          example: "5877.78"
      example:
        currency: EUR
        amount: "123"
    frequencyCode:
      title: frequencyCode
      type: string
      description: |-
        The following codes from the "EventFrequency7Code" of ISO 20022 are supported.
        - "Daily"
        - "Weekly"
        - "EveryTwoWeeks"
        - "Monthly"
        - "EveryTwoMonths"
        - "Quarterly"
        - "SemiAnnual"
        - "Annual"
      example: Daily
      enum:
        - Daily
        - Weekly
        - EveryTwoWeeks
        - Monthly
        - EveryTwoMonths
        - Quarterly
        - SemiAnnual
        - Annual
    dayOfExecution:
      title: dayOfExecution
      type: integer
      description: |-
        Day of execution as string.

        This string consists of up two characters.
        Leading zeroes are not allowed.

        31 is ultimo of the month.
      format: int32
      example: 1
      enum:
        - 1
